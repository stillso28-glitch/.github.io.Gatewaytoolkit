name: Render Listing Video

on:
  workflow_dispatch:
    inputs:
      output_slug:
        description: 'Output filename (no .mp4)'
        required: true
        type: string
      composition_path:
        description: 'Repo-relative path to composition HTML'
        required: true
        type: string
      music_path:
        description: 'Repo-relative path to music file (optional)'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install HyperFrames CLI
        run: npm install -g hyperframes

      - name: Build render project
        run: |
          mkdir -p /tmp/hf-render
          cp "${{ github.workspace }}/${{ inputs.composition_path }}" /tmp/hf-render/index.html
          cd /tmp/hf-render
          npm init -y
          npm install gsap
          npx puppeteer browsers install chrome

      - name: Render to MP4
        run: |
          mkdir -p "${{ github.workspace }}/renders"
          npx hyperframes render /tmp/hf-render \
            --quality high \
            --fps 30 \
            --output "${{ github.workspace }}/renders/${{ inputs.output_slug }}_silent.mp4"

      - name: Mix in background music
        run: |
          SILENT="${{ github.workspace }}/renders/${{ inputs.output_slug }}_silent.mp4"
          FINAL="${{ github.workspace }}/renders/${{ inputs.output_slug }}.mp4"
          MUSIC_PATH="${{ inputs.music_path }}"
          if [ -n "$MUSIC_PATH" ] && [ -f "${{ github.workspace }}/$MUSIC_PATH" ]; then
            ffmpeg -i "$SILENT" \
                   -i "${{ github.workspace }}/$MUSIC_PATH" \
                   -c:v copy -c:a aac -b:a 192k \
                   -map 0:v:0 -map 1:a:0 \
                   -af "afade=t=out:st=$(ffprobe -v error -show_entries format=duration -of default=noprint_wrappers=1:nokey=1 "$SILENT" | awk '{print int($1)-2}'):d=2,volume=0.75" \
                   -shortest -y "$FINAL"
            rm "$SILENT"
          else
            mv "$SILENT" "$FINAL"
          fi

      - name: Commit render and clean up
        run: |
          cd "${{ github.workspace }}"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "GitHub Actions"
          git add "renders/${{ inputs.output_slug }}.mp4"
          git rm --ignore-unmatch "${{ inputs.composition_path }}"
          if [ -n "${{ inputs.music_path }}" ]; then
            git rm --ignore-unmatch "${{ inputs.music_path }}"
          fi
          git commit -m "Rendered video: ${{ inputs.output_slug }}"
          git push
